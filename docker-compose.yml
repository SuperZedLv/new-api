

version: '3.4' 

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "443:3000"
      - "80:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api 
      - REDIS_CONN_STRING=redis://:123456@redis:6379 
      - TZ=Asia/Shanghai
      - DEBUG=false
      - GIN_MODE=release
      - ERROR_LOG_ENABLED=true
      - STREAMING_TIMEOUT=600
      - RELAY_TIMEOUT=300
      - MAX_REQUEST_BODY_MB=64
      - STREAM_SCANNER_MAX_BUFFER_MB=128
      - BATCH_UPDATE_ENABLED=true  
      - NODE_NAME=xibei  
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network


volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
